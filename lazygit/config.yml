gui:
  showGraph: "always"
  showBranchCommitGraph: true
  language: "ja" # 日本語に戻す
  showIcons: true
  nerdFontsVersion: "3"
  timeFormat: '02 Jan'
  shortTimeFormat: '15:04'
  showRandomTip: false # ランダムなヒントを無効化してシンプルに
  showBottomLine: false # ステータスバーを非表示にしてカラフルな要素を削除
  theme:
    # BEGIN GENERATED COLORS
    # ボーダー色
    activeBorderColor:
      - '#58CAF8' # Vibrant Teal
      - bold
    inactiveBorderColor:
      - '#45799D' # UI Border (Visibility improved)
    # テキスト色
    optionsTextColor:
      - '#CDE9F5'
    defaultFgColor:
      - '#CDE9F5'
    # 選択行の背景 (Ocean Blue - 視認性と可読性のバランス)
    selectedLineBgColor:
      - '#375F98'
    selectedRangeBgColor:
      - '#375F98'
    # Git関連の色
    unstagedChangesColor:
      - '#B17DCF' # Glitch Purple
    cherryPickedCommitFgColor:
      - '#58CAF8'
    cherryPickedCommitBgColor:
      - '#102337' # Dark Teal Panel
  # 著者色設定
  authorColors:
    '*': '#8C97B5' # Git Blame Gray (improved visibility)
    # END GENERATED COLORS
os:
  editPreset: "nvim-remote" # editAtLineAndWait/openDirInEditorのフォールバック用に維持
  # e/o/editAtLine: lazygitフロートを閉じてからネイティブ--remoteでbufferに開く(新タブを作らない)。
  # filenameは式に埋めず裸のシェル引数で渡す(lazygitのダブルクォート展開との衝突回避)。
  edit: 'if [ -z "$NVIM" ]; then nvim -- {{filename}}; else nvim --server "$NVIM" --remote-expr "v:lua.lazygit_hide()" && nvim --server "$NVIM" --remote {{filename}}; fi'
  editAtLine: 'if [ -z "$NVIM" ]; then nvim +{{line}} -- {{filename}}; else nvim --server "$NVIM" --remote-expr "v:lua.lazygit_hide()" && nvim --server "$NVIM" --remote {{filename}} && nvim --server "$NVIM" --remote-send ":{{line}}<CR>"; fi'
  open: 'if [ -z "$NVIM" ]; then open -- {{filename}}; else nvim --server "$NVIM" --remote-expr "v:lua.lazygit_hide()" && nvim --server "$NVIM" --remote {{filename}}; fi'
git:
  autoFetch: true # 自動fetchを有効化
  autoRefresh: true # 自動リフレッシュを有効化してgit操作を即座に反映
  fetchAll: false # git fetch --allを避けて必要なremoteのみ取得（パフォーマンス改善）
  log:
    showGraph: "always"
    showWholeGraph: true # git log --all を有効化（全ブランチ表示）
    order: "topo-order"
  # 全ブランチ表示のカスタマイズ（--allを削除、-n 200で件数制限）
  branchLogCmd: "git log --graph --color=always --abbrev-commit --decorate --date=relative --pretty=medium -n 200 {{branchName}} --"
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --side-by-side --commit-decoration-style=none --commit-style=raw --file-decoration-style=none --syntax-theme=Nord
  mainBranches:
    - main
    - master
refresher:
  refreshInterval: 1 # リフレッシュ間隔を短縮（外部変更の迅速な検出）
  fetchInterval: 10 # fetch interval（外部git操作をパネル3/4に自動反映）
keybinding:
  commits:
    moveDownCommit: '<c-d>'
    moveUpCommit: '<c-u>'
    openLogMenu: '<c-g>' # Ctrl+Gでログメニューを開く（Karabinerとの競合回避）
customCommands:
  - key: "<c-g>"
    context: "files"
    description: "Copilot AIでコミットメッセージを生成"
    command: >-
      DIFF=$(git diff --cached) && if [ -z "$DIFF" ]; then printf '\033[31mエラー: ステージされた変更がありません\033[0m\n' && read -r -p '続行するにはキーを押してください...'; else clear && printf '\033[33mCopilot AIがコミットメッセージを生成中...\033[0m\n' && LOG=$(git log --oneline -20 2>/dev/null) && MSG=$(copilot -p "$(printf 'Recent commits:\n%s\n\nDiff:\n%s\n\nGenerate ONLY a one-line Git commit message that follows the style and language of the recent commits shown above. If no recent commits exist, default to Japanese. Use Conventional Commits format: type(scope): subject. Types: feat, fix, docs, style, refactor, perf, test, chore. Based strictly on the diff. Output ONLY the message, nothing else.' "$LOG" "$DIFF")" --allow-all-tools 2>/dev/null | sed '/^$/,$d') && git commit -e -m "$MSG"; fi
    output: terminal
